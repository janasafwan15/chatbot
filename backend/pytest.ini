[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# بيّن الاختبارات البطيئة (> 2 ثانية)
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    slow: اختبارات بطيئة تحتاج خدمات خارجية (RAG, Ollama)
    db:   اختبارات تحتاج قاعدة بيانات
