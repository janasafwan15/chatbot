events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/javascript;

    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=20r/m;

    # ── HTTP (يشتغل دايماً) ───────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Certbot challenge — مطلوب قبل إصدار الشهادة
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # حوّل كل حركة HTTP لـ HTTPS
        #location / {
        #    return 301 https://$host$request_uri;
        #}

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://backend:8010/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 200s;
        }

        location /api/chat {
            limit_req zone=chat_limit burst=5 nodelay;
            proxy_pass         http://backend:8010/chat;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 200s;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────
    # قبل التشغيل، احصل على الشهادة:
    #   docker compose run --rm certbot certonly --webroot \
    #     -w /var/www/certbot -d yourdomain.com
